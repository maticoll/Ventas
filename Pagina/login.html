<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpheraBeauty — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:   #C4607A;
      --blush:  #E8A4B8;
      --text:   #2D1B25;
      --muted:  #B08A96;
      --border: #EDD8DE;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(150deg, #FDF6F1 0%, #FBF0F4 50%, #F8EAF0 100%);
      background-attachment: fixed;
      color: var(--text);
    }

    .petal {
      position: fixed; border-radius: 50%; pointer-events: none;
    }
    .petal-1 {
      width: 500px; height: 500px; top: -180px; right: -120px;
      background: radial-gradient(circle, rgba(232,164,184,0.2) 0%, transparent 70%);
    }
    .petal-2 {
      width: 350px; height: 350px; bottom: -80px; left: -60px;
      background: radial-gradient(circle, rgba(196,96,122,0.12) 0%, transparent 70%);
    }

    .layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      box-shadow: 0 8px 40px rgba(196,96,122,0.1);
      backdrop-filter: blur(8px);
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
      display: block;
      text-decoration: none;
      color: var(--text);
    }

    .logo em { font-style: italic; color: var(--rose); }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2.25rem;
    }

    /* Decorative separator */
    .deco-line {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--rose), var(--blush));
      border-radius: 2px;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.9rem;
      background: var(--rose);
      color: #FFFFFF;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 100px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(196,96,122,0.25);
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(196,96,122,0.35); }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      font-size: 0.82rem; color: var(--muted);
      text-decoration: none; transition: color 0.2s; font-weight: 500;
    }

    .back-link:hover { color: var(--rose); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Mobile responsive ─────────────────────────────────────── */
    @media (max-width: 480px) {
      .layout { padding: 1.25rem; align-items: flex-start; padding-top: 3rem; }
      .card { padding: 2rem 1.5rem; border-radius: 12px; }
      .logo { font-size: 1.35rem; }
      .btn { padding: 0.85rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="petal petal-1"></div>
  <div class="petal petal-2"></div>
  <div class="layout">
    <div class="card">
      <a href="index.html" class="logo">Ophera<em>Beauty</em></a>
      <p class="subtitle">Panel de control · Marketplace UY</p>
      <div class="deco-line"></div>

      <a href="dashboard.html" class="btn">
        Entrar al dashboard
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 8h10M9 4l4 4-4 4"/>
        </svg>
      </a>

      <div class="divider">o</div>
      <a href="index.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 8H3M7 4L3 8l4 4"/>
        </svg>
        Volver al inicio
      </a>
    </div>
  </div>
</body>
</html>
